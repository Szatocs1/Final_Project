<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kezdőlap </title>
  <link rel="stylesheet" href="./style.css" />
  <script type="module">
    import { getMe, writeStatus, apiFetch } from './utils.js';

    window.addEventListener('DOMContentLoaded', async () => {
      const status = document.getElementById('status');
      const user = await getMe();
      if (user) {
        writeStatus(status, `Be vagy jelentkezve: ${user.name} <${user.email}>`, 'ok');
        document.getElementById('auth-actions').innerHTML = `
          <a class="btn" href="./profile.html">Profil</a>
          <button class="btn" id="logoutBtn">Kilépés</button>
        `;
        document.getElementById('logoutBtn').onclick = async () => {
          try {
            await apiFetch('/api/auth/logout', { method: 'POST' });
            location.reload();
          } catch (e) {
            writeStatus(status, e.message, 'err');
          }
        };
      } else {
        writeStatus(status, 'Nem vagy bejelentkezve.', '');
        document.getElementById('auth-actions').innerHTML = `
          <a class="btn" href="./login.html">Bejelentkezés</a>
          <a class="btn" href="./register.html">Regisztráció</a>
        `;
      }
    });
  </script>
</head>
<body>
  <div class="container">
    <h1>Session alapú bejelentkezés</h1>
    <p>Egyszerű regisztráció / bejelentkezés / kilépés flow, JWT nélkül, session sütivel.</p>

    <nav id="auth-actions"></nav>

    <div id="status" class="status">Állapot betöltése...</div>

    <hr />
    <h2>Védett API példa</h2>
    <p>Ez a gomb csak bejelentkezve ad vissza titkos üzenetet.</p>
    <button class="btn" id="secretBtn">/api/secret hívása</button>
    <div id="secretOut" class="status"></div>

    <script type="module">
      import { apiFetch, writeStatus } from './utils.js';
      const btn = document.getElementById('secretBtn');
      const out = document.getElementById('secretOut');
      btn.onclick = async () => {
        writeStatus(out, 'Kérés...', '');
        try {
          const data = await apiFetch('/api/secret');
          writeStatus(out, JSON.stringify(data, null, 2), 'ok');
        } catch (e) {
          writeStatus(out, e.message, 'err');
        }
      };
    </script>
  </div>
</body>
</html>
