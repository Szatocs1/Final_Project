<div class="auth-container">
  <div class="auth-logCard">
    <div class="logImg">
    </div>

    <div class="logText">
      <span class="premium-label">Üdvözöljük újra</span>
      <h1>PROFIL</h1>
      <div class="divider"></div>

        <div class="profile-info">
          <div class="input-group">
            <label>Név:</label>
            <p>{{ user?.nev }}</p>
          </div>

          <div class="input-group">
            <label>Email:</label><br>
            <p>{{ user?.email }}</p>
          </div>

          <div class="input-group">
            <label>Telefonszám:</label><br>
            <p>{{ user?.telefonszam || 'Nincs megadva' }}</p>
          </div>

          <div class="input-group">
            <label>Foglaltság:</label><br>
            <p>{{ user?.foglaltsag }}</p>
          </div>
        </div>

        <form class="logForm" (ngSubmit)="onLogout()">
          <button type="submit" class="submit-btn">KIJELENTKEZÉS</button>
          <p class="auth-footer">
            Módosítani szeretné adatait? <a routerLink="/edit-profile">Szerkesztés</a>
          </p>
        </form>
      
    </div>
  </div>
</div>
