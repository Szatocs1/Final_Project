<div class="auth-container">
    <div class="auth-regCard">
        <div class="regText">
            <span class="premium-label">Tagsági Program</span>
            <h1>REGISZTRÁCIÓ</h1>
            <div class="divider"></div>
            
            <form class="regForm" #registrationForm="ngForm" (ngSubmit)="onSubmit()">
                    <div class="input-group">
                    <label>Teljes Név</label>
                    <input type="text" name="username" [(ngModel)]="username" placeholder="pl. Kiss István" />
                </div>

                <div class="input-group">
                    <label>Email cím</label>
                    <input type="email" name="email" [(ngModel)]="email" placeholder="pelda@email.hu" />
                </div>

                <div class="input-group">
                    <label>Telefonszám</label>
                    <input type="tel" name="phone_number" [(ngModel)]="phone_number" placeholder="+36 30 123 4567" />
                </div>

                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Jelszó</label>
                        <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••" />
                    </div>
                    <div class="input-group">
                        <label>Jelszó újra</label>
                        <input type="password" name="password_again" [(ngModel)]="password_again" placeholder="••••••••" />
                    </div>
                </div>

                <button type="submit" class="submit-btn" [disabled]="!registrationForm.form.valid">
                    FIÓK LÉTREHOZÁSA
                </button>
                
                <p class="auth-footer">Már van fiókja? <a routerLink="/login">Jelentkezzen be</a></p>
            </form>
        </div>

        <div class="regImg">
            <div class="overlay">
                <div class="logo-box">
                    <h2 class="logo-text">DIVISUM</h2>
                    <span class="logo-slogan">BARBERSHOP</span>
                </div>
            </div>
        </div>
    </div>
</div>
