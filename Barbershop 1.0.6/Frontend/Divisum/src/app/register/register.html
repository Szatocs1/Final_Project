<div class="container">
    <div class="regCard">
        <div class="regText">
            <span class="premium-label">Tagsági Program</span>
            <h1>REGISZTRÁCIÓ</h1>
            <div class="divider"></div>
            
            <form class="regForm">
                <div class="input-group">
                    <label>Felhasználónév</label>
                    <input type="text" placeholder="pl. barber_king" />
                </div>

                <div class="input-group">
                    <label>Email cím</label>
                    <input type="email" placeholder="pelda@email.hu" />
                </div>

                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Jelszó</label>
                        <input type="password" placeholder="••••••••" />
                    </div>
                    <div class="input-group">
                        <label>Jelszó újra</label>
                        <input type="password" placeholder="••••••••" />
                    </div>
                </div>

                <button type="submit" class="submit-btn">FIÓK LÉTREHOZÁSA</button>
                
                <p class="auth-footer">Már van fiókja? <a routerLink="/login">Jelentkezzen be</a></p>
            </form>
        </div>

        <div class="regImg">
            <div class="overlay">
                <div class="logo-box">
                    <h2 class="logo-text">DIVISUM</h2>
                    <span class="logo-slogan">BARBERSHOP</span>
                </div>
            </div>
        </div>
    </div>
</div>
