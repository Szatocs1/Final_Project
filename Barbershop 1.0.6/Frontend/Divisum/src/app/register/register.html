<div class="auth-container">
    <div class="auth-regCard">
        <div class="regText">
            <span class="premium-label">Tagsági Program</span>
            <h1>REGISZTRÁCIÓ</h1>
            <div class="divider"></div>
            
            <form class="regForm" #registrationForm="ngForm" (ngSubmit)="onSubmit()">
                
                <div class="alert-box" *ngIf="serverError">
                    {{ serverError }}
                </div>

                <div class="input-group">
                    <label>Teljes Név</label>
                    <input type="text" name="username" [(ngModel)]="username" #uName="ngModel" required placeholder="pl. Kiss István" />
                    <small class="error-msg" *ngIf="uName.invalid && uName.touched">Név megadása kötelező!</small>
                </div>

                <div class="input-group">
                    <label>Email cím</label>
                    <input type="email" name="email" [(ngModel)]="email" #uEmail="ngModel" required email placeholder="pelda@email.hu" />
                    <small class="error-msg" *ngIf="uEmail.invalid && uEmail.touched">Érvényes email címet adjon meg!</small>
                </div>

                <div class="input-group">
                    <label>Telefonszám</label>
                    <input 
                        type="tel" 
                        name="phone_number" 
                        [(ngModel)]="phone_number" 
                        #uPhone="ngModel" 
                        required 
                        pattern="^(06\d{9})|(\+36\d{9})$"
                        placeholder="+36301234567" 
                    />
                    <small class="error-msg" *ngIf="uPhone.errors?.['required'] && uPhone.touched">Telefonszám megadása kötelező!</small>
                    <small class="error-msg" *ngIf="uPhone.errors?.['pattern'] && uPhone.touched">Helytelen formátum (06... vagy +36...)!</small>
                </div>

                <div class="grid-inputs">
                    <div class="input-group">
                        <label>Jelszó</label>
                        <input type="password" name="password" [(ngModel)]="password" #uPass="ngModel" required minlength="6" placeholder="••••••••" />
                        <small class="error-msg" *ngIf="uPass.invalid && uPass.touched">Min. 6 karakter!</small>
                    </div>
                    <div class="input-group">
                        <label>Jelszó újra</label>
                        <input type="password" name="password_again" [(ngModel)]="password_again" #uPass2="ngModel" required placeholder="••••••••" />
                        <small class="error-msg" *ngIf="password !== password_again && uPass2.touched">A jelszavak nem egyeznek!</small>
                    </div>
                </div>

                <button type="submit" class="submit-btn" [disabled]="!registrationForm.form.valid || password !== password_again">
                    FIÓK LÉTREHOZÁSA
                </button>
                
                <p class="auth-footer">Már van fiókja? <a routerLink="/login">Jelentkezzen be</a></p>
            </form>
        </div>

        <div class="regImg">
            <div class="overlay">
                <div class="logo-box">
                    <h2 class="logo-text">DIVISUM</h2>
                    <span class="logo-slogan">BARBERSHOP</span>
                </div>
            </div>
        </div>
    </div>
</div>
